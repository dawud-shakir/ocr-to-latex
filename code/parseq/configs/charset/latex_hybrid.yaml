# @package _global_
# Character fallback + selected multi-character LaTeX command/structure tokens.
#
# In latex_hybrid mode, max_label_length is measured in hybrid tokens.
# Example: r"\\theta" is one token, and x_{2} tokenizes as [x] [_{] [2] [}].
model:
  tokenizer_type: latex_hybrid
  charset_train: "0123456789abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ!\"#$%&'()*+,-./:;<=>?@[\\]^_`{|}~ " # includes a whitespace
  charset_test: ${model.charset_train}
  latex_tokens:
    # structural:
    - "_{"
    - "^{"
    - "}{"
    - "{}"

    # group-opening commands:
    - "\\frac{"
    - "\\sqrt{"

    # symbol commands:
    - "\\alpha"
    - "\\beta"
    - "\\gamma"
    - "\\theta"
    - "\\lambda"
    - "\\mu"
    - "\\pi"
    - "\\Sigma"
    - "\\sum"
    - "\\int"
    - "\\infty"
    - "\\leq"
    - "\\geq"
    - "\\neq"
    - "\\cdot"
    - "\\times"
    - "\\to"
    - "\\rightarrow"

    # function commands:
    - "\\sin"
    - "\\cos"
    - "\\tan"
    - "\\log"
    - "\\ln"
    - "\\lim"
    - "\\max"
    - "\\min"
