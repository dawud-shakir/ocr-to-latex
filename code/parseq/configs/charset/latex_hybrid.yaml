# @package _global_
# Character fallback + selected multi-character LaTeX command tokens.
#
# `max_label_length` is now measured in hybrid tokens when tokenizer_type is
# latex_hybrid. For example, \frac{x+1}{y} becomes:
#   [\frac] [{] [x] [+] [1] [}] [{] [y] [}]
model:
  tokenizer_type: latex_hybrid
  charset_train: "0123456789abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ!\"#$%&'()*+,-./:;<=>?@[\\]^_`{|}~ "

latex_tokens:

  # structural:
  - "_{"
  - "^{"
  - "}{"

  # group-opening commands:
  - "\\frac{"
  - "\\sqrt{"

  # symbol commands:
  - "\\alpha"
  - "\\beta"
  - "\\gamma"
  - "\\theta"
  - "\\lambda"
  - "\\mu"
  - "\\pi"
  - "\\Sigma"
  - "\\sum"
  - "\\int"
  - "\\infty"
  - "\\leq"
  - "\\geq"
  - "\\neq"
  - "\\cdot"
  - "\\times"
  - "\\to"
  - "\\rightarrow"

  # function commands:
  - "\\sin"
  - "\\cos"
  - "\\tan"
  - "\\log"
  - "\\ln"
  - "\\lim"
  - "\\max"
  - "\\min"